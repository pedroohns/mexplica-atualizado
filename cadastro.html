<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEXPLICA | Bem-vindo</title>
    <link rel="stylesheet" href="style_cadastro.css"> 
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body> 
    <header>
        <nav id="cadastro-nav">
            <ul id="lista" type="none">
                <li><a href="#">Colabore</a></li>
                <li><a href="#">Comunidade</a></li>
                <li><a href="#">Ajuda</a></li>
                <li><a href="#">Sobre</a></li>
            </ul>
            <input type="button" value="acessar conta" id="acessarContaBtn">
        </nav>
    </header>

    <main id="cadastro-main">
        <div class="cadastro-content">
            <a href="landing_page.html">
                <button id="back-button">VOLTAR</button>
            </a>

            <h1 class="cadastro-title">Bem-vindo!</h1>
            <p class="cadastro-subtitle">Crie uma conta ou entre para poder fazer parte da comunidade.</p>

            <div id="signup-options">
                <button class="option-button primary-option" id="btn-email-mode">Continuar com email</button>
                <button class="option-button secondary-option" id="btn-phone-mode">Continuar com número de telefone</button>
            </div>

            <form id="cadastro-form" novalidate>
                <input 
                    type="text" 
                    id="campo-principal"
                    placeholder="Insira seu email" 
                    aria-label="Entrada de dados">
                
                <span id="error-message" style="color: #f04848; font-size: 0.85rem; display: block; margin-top: 5px;"></span>

                <button type="submit" class="continue-button">Continuar</button>
                
                <p class="form-error-message">Estou com problemas para continuar</p>
            </form>

        </div>
    </main>
    
    <script src="script_cadastro.js"></script>
</body>
</html>
